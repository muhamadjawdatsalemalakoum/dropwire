name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Engine: format, lint, build, and test the `irohcore` crate on all three desktop OSes.
  engine:
    name: engine (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS (x10 Actions-minute multiplier) is omitted from routine CI to
        # conserve private-repo minutes; the release workflow builds + tests it
        # on tags. Re-add `macos-latest` here once the repo is public (free).
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -p irohcore --all-targets -- -D warnings

      - name: Build
        run: cargo build -p irohcore --verbose

      - name: Test
        run: cargo test -p irohcore --verbose

